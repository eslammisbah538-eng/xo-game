<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X O ARCADE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">

    <!-- HOME -->
    <section id="screen-home" class="screen active">
      <div class="logo-block">
        <div class="logo-mark">
          <span class="lx">X</span>
          <span style="color:var(--gray);margin:0 8px;">VS</span>
          <span class="lo">O</span>
        </div>
        <p class="tagline">ARCADE EDITION</p>
      </div>

      <div class="card pixel-box">
        <!-- Create room -->
        <button class="btn primary" id="btn-create">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          إنشاء غرفة جديدة
        </button>

        <div class="divider">— أو —</div>

        <label class="field-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-left:5px;">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          ادخل كود الغرفة
        </label>

        <div class="input-row">
          <input type="text" id="join-code" placeholder="ABC123" maxlength="6" autocomplete="off" spellcheck="false" />
          <button class="btn secondary join-btn" id="btn-join">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
          </button>
        </div>
        <p class="err" id="join-err"></p>
      </div>

      <p class="insert-coin">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block;vertical-align:middle;margin-left:4px;">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        INSERT COIN TO PLAY
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block;vertical-align:middle;margin-right:4px;">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </p>
    </section>

    <!-- WAITING -->
    <section id="screen-waiting" class="screen">
      <div class="back-row">
        <button class="btn-back" id="btn-back-waiting">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          رجوع
        </button>
      </div>
      <p class="page-title">ابعت الكود لصاحبك</p>

      <div class="card pixel-box">
        <div class="code-box">
          <div class="code" id="room-code-display">------</div>
          <p class="code-hint">ROOM CODE</p>
        </div>
        <button class="btn primary small" id="btn-copy">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          نسخ الكود
        </button>
        <div class="status-row">
          <div class="dot waiting" id="wait-dot"></div>
          <span id="wait-text">WAITING FOR PLAYER 2...</span>
        </div>
      </div>
    </section>

    <!-- GAME -->
    <section id="screen-game" class="screen">

      <!-- Player Status Bars -->
      <div class="players-bar">
        <!-- Me -->
        <div class="player-slot" id="slot-me">
          <div class="player-status-indicator" id="indicator-me">
            <div class="status-pip"></div>
          </div>
          <div class="player-info">
            <span class="player-tag" id="tag-me">YOU</span>
            <span class="player-sym" id="sym-me">X</span>
          </div>
          <div class="player-state-label" id="state-me">READY</div>
        </div>

        <!-- VS -->
        <div class="vs-divider">
          <span class="vs-text">VS</span>
          <button class="btn-back exit-btn" id="btn-back-game">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            خروج
          </button>
        </div>

        <!-- Opponent -->
        <div class="player-slot opponent" id="slot-opp">
          <div class="player-status-indicator" id="indicator-opp">
            <div class="status-pip"></div>
          </div>
          <div class="player-info">
            <span class="player-tag" id="tag-opp">OPP</span>
            <span class="player-sym" id="sym-opp">O</span>
          </div>
          <div class="player-state-label" id="state-opp">READY</div>
        </div>
      </div>

      <!-- Turn Banner -->
      <div class="turn-banner x-turn" id="turn-banner">
        <span id="turn-text">YOUR TURN</span>
      </div>

      <!-- Board -->
      <div class="board" id="board"></div>

      <!-- Result -->
      <div class="result-msg" id="result-msg"></div>

      <!-- Rematch Panel -->
      <div class="rematch-panel" id="rematch-panel" style="display:none;">
        <p class="rematch-title">الجولة انتهت!</p>
        <div class="rematch-buttons">
          <button class="btn rematch-btn accept" id="btn-rematch-accept">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
            جولة تانية
          </button>
          <button class="btn rematch-btn decline" id="btn-rematch-decline">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            استسلام
          </button>
        </div>
        <div class="rematch-status" id="rematch-status"></div>
      </div>

      <!-- Scores -->
      <div class="score-row">
        <div class="score-card x-card">
          <div class="sc-label">X</div>
          <div class="sc-val" id="score-x">0</div>
        </div>
        <div class="score-card d-card">
          <div class="sc-label">TIE</div>
          <div class="sc-val" id="score-d">0</div>
        </div>
        <div class="score-card o-card">
          <div class="sc-label">O</div>
          <div class="sc-val" id="score-o">0</div>
        </div>
      </div>

      <!-- Emoji Reaction Bar -->
      <div class="emoji-bar">
        <span class="emoji-bar-label">REACT</span>
        <div class="emoji-btns">
          <button class="emoji-btn" data-emoji="😂">😂</button>
          <button class="emoji-btn" data-emoji="😤">😤</button>
          <button class="emoji-btn" data-emoji="🔥">🔥</button>
          <button class="emoji-btn" data-emoji="💀">💀</button>
          <button class="emoji-btn" data-emoji="😎">😎</button>
        </div>
      </div>

    </section>
  </div>

  <div id="emoji-stage" aria-hidden="true"></div>
  <script type="module" src="game.js"></script>
</body>
</html>
